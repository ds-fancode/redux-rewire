name: Publish Github

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Configure git
        run: |
          git config --global user.email "fc-bot@fancode.com"
          git config --global user.name "fc-bot"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.9.0

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn install --immutable

      - name: Creating .npmrc
        run: |
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" >> "$HOME/.npmrc"
          echo "@ds-fancode:registry=https://npm.pkg.github.com" >> "$HOME/.npmrc"

      # On push to main: Only create Version PR (no publish)
      - name: Bump version
        run: yarn changeset-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish packages
      - name: Publish to GitHub Packages
        run: yarn changeset-publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit release changes and create tag
        if: ${{ success() }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git add -A

          if git diff --cached --quiet; then
            echo "No release file changes to commit."
          else
            git commit -m "chore(release): v${VERSION}"
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists, skipping tag creation."
          else
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
          fi

      # Push changes to repository
      - name: Push changes to repository
        if: ${{ success() }}
        run: git push origin HEAD:main && git push origin --tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
